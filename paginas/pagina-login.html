<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ</title>
    <link rel="stylesheet" href="../css/pag-login.css">
    <link rel="shortcut icon" href="../img/img-icon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header__container">
        <img src="../img/logo-soulup.webp" alt="Logotipo SoulUp" class="header__logo">
        <nav class="nav__container">
            <div class="nav__menu">
                <a href="../index.html" class="nav__link">Página Inicial</a>
                <a href="./pagina-quem-somos.html" class="nav__link">Quem somos?</a>
                <a href="./pagina-sobre.html" class="nav__link">Sobre</a>
                <a href="./pagina-faq.html" class="nav__link nav__link">FAQ</a>
                <a href="./pagina-contato.html" class="nav__link">Contato</a>
            </div>
            <a href="./pagina-login.html" class="nav-btn__login">Login</a>
        </nav>
    </header>
    <main>
        <div class="login-page">
            <div class="login__container">
                <fieldset class="form-cadastro">
                    <div class="form-cadastro__field">
                        <label for="nome" class="form-cadastro__label">Nome:</label>
                        <input type="text" id="nome" name="nome" class="form-cadastro__input"
                            placeholder="Nome Completo" required maxlength="120">
                        <label for="email" class="form-cadastro__label">Email:</label>
                        <input type="email" id="email" name="email" class="form-cadastro__input" placeholder="E-mail"
                            required minlength="15" maxlength="200">
                        <label for="password" class="form-cadastro__label">Senha:</label>
                        <input type="password" id="password" name="password" class="form-cadastro__input"
                            placeholder="Digite sua senha" required minlength="8" maxlength="30">
                        <label for="birthday" class="form-cadastro__label">Data de Nascimento:</label>
                        <input type="date" id="birthday" name="birthday"
                            class="form-cadastro__input form-cadastro__input--date" min="1900-01-01" max="2050-05-05"
                            required>
                        <button type="submit" class="form-cadastro__button">Cadastrar</button>
                    </div>
                </fieldset>
            </div>
            <div class="login-container__aside">
                <h2 class="banner-content">
                    <!-- fonte única -->
                    <span class="banner-title">seu clique</span><br>
                    <!-- fontes mistas -->
                    <span class="banner-title">é</span>
                    <span class="banner-title--highlight">digital.</span><br>
                    <!-- fonte única -->
                    <span class="banner-title">mas o impacto</span><br>
                    <!-- fontes mistas -->
                    <span class="banner-title">é</span>
                    <span class="banner-title--highlight">real.</span>
                </h2>
                <div class=".banner__logo-container">
                <img src="../img/logo-soulup.webp" alt="Logotipo SoulUp" class="banner__logo-img">
                </div>
            </div>
        </div>
        </div>
    </main>
</body>

</html>
